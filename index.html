<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz CCNA1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Quiz CCNA1</h1>
        
        <!-- Menu principal -->
        <div id="home" class="screen active">
            <p>Choisissez votre mode de jeu :</p>
            <button onclick="startQuiz('training')" class="btn">Mode Entraînement (Réponse immédiate)</button>
            <button onclick="startQuiz('exam')" class="btn">Mode Examen (Toutes les questions, résultats à la fin)</button>
            <button onclick="startQuiz('series60')" class="btn" style="background-color: #8e44ad;">Mode Examen Blanc (60 questions aléatoires)</button>
            
            <div class="series-container" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                <h3>Séries d'entraînement (10 questions)</h3>
                <div class="series-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    <button onclick="startQuiz('series_1')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 1</button>
                    <button onclick="startQuiz('series_2')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 2</button>
                    <button onclick="startQuiz('series_3')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 3</button>
                    <button onclick="startQuiz('series_4')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 4</button>
                    <button onclick="startQuiz('series_5')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 5</button>
                    <button onclick="startQuiz('series_6')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 6</button>
                    <button onclick="startQuiz('series_7')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 7</button>
                    <button onclick="startQuiz('series_8')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 8</button>
                    <button onclick="startQuiz('series_9')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 9</button>
                    <button onclick="startQuiz('series_10')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 10</button>
                    <button onclick="startQuiz('series_11')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 11</button>
                    <button onclick="startQuiz('series_12')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 12</button>
                    <button onclick="startQuiz('series_13')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 13</button>
                    <button onclick="startQuiz('series_14')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 14</button>
                    <button onclick="startQuiz('series_15')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 15</button>
                    <button onclick="startQuiz('series_16')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 16</button>
                    <button onclick="startQuiz('series_17')" class="btn" style="background-color: #f39c12; font-size: 0.9em;">Série 17</button>
                </div>
            </div>
        </div>

        <!-- Écran du quiz -->
        <div id="quiz" class="screen" style="display: none;">
            <div class="quiz-header">
                <span id="question-counter">Question 1/5</span>
                <span id="score-display" style="display: none;">Score: 0</span>
            </div>
            <h2 id="question-text">Question...</h2>
            <div id="options-container" class="options-grid">
                <!-- Les options seront générées ici -->
            </div>
            <div id="feedback" class="feedback" style="display: none;"></div>
            <button id="prev-btn" class="btn prev-btn" style="display: none; background-color: #95a5a6; margin-top: 20px; margin-right: 10px;" onclick="prevQuestion()">Précédent</button>
            <button id="validate-btn" class="btn" style="display: none; margin-top: 20px; background-color: #2ecc71;" onclick="validateAnswer()">Valider</button>
            <button id="next-btn" class="btn next-btn" style="display: none;" onclick="nextQuestion()">Suivant</button>
        </div>

        <!-- Écran de résultats -->
        <div id="results" class="screen" style="display: none;">
            <h2>Résultats</h2>
            <div class="score-circle">
                <span id="final-score">0%</span>
            </div>
            <div id="result-message"></div>
            <button onclick="location.reload()" class="btn">Retour au menu</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="glossary.js"></script>
    <script src="script.js"></script>
</body>
</html>
