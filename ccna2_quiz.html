ur réseau configure le routeur R1 pour l’attribution d’adresse IPv6. Sur la base de la configuration partielle, quel système d’attribution d’adresses IPv6 global monodiffusion l’administrateur a-t-il l’intention de mettre en œuvre ?"},{"id":95,"multi":false,"explanation":"","type":"quiz","image":"https://ccnareponses.com/wp-content/uploads/2021/12/2021-12-23_163739.png","options":[{"text":"DTP","isCorrect":false},{"text":"STP","isCorrect":false},{"text":"PAgP","isCorrect":true},{"text":"LACP","isCorrect":false}],"title":"Examinez l’illustration. Un administrateur réseau vérifie la configuration du commutateur S1. Quel protocole a été implémenté pour regrouper plusieurs ports physiques en une liaison logique ?"},{"id":96,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"adresses MAC sécurisées automatiques","isCorrect":false},{"text":"adresses MAC sécurisées dynamiques","isCorrect":false},{"text":"adresses MAC sécurisées statiques","isCorrect":false},{"text":"adresses MAC sécurisées fixes","isCorrect":true}],"title":"Une politique de sécurité de l’entreprise exige que l’adressage MAC soit enregistré de manière dynamique et ajouté à la table des adresses MAC et à la configuration en cours sur chaque commutateur. Quelle configuration de la sécurité des ports permettra de respecter cette mesure ?"},{"id":97,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"PortFast n’est pas configuré sur tous les ports d’accès.","isCorrect":true},{"text":"Les ports d’accès configurés avec la protection racine ne peuvent pas être configurés avec la garde BPDU.","isCorrect":false},{"text":"Les ports d’accès appartiennent à différents VLAN.","isCorrect":false},{"text":"BPDU guard doit être activé en mode de commande de configuration de l’interface.","isCorrect":false}],"title":"Un administrateur réseau utilise la commande de configuration globale spanning-tree portfastbpduguard default pour activer la garde BPDU sur un commutateur. Cependant, BPDU guard n’est pas activé sur tous les ports d’accès. Quelle est la source du problème?"},{"id":99,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"Activez globalement la surveillance DHCP (snooping )sur le commutateur.","isCorrect":true},{"text":"Il active manuellement un lien de trunk.","isCorrect":false},{"text":"Il active PortFast globalement sur un commutateur.","isCorrect":false},{"text":"Désactivez les négociations DTP sur les ports trunking.","isCorrect":false}],"title":"Quel est l’effet de l’entrée de la commande de configuration ip dhcp snooping sur un commutateur?"},{"id":100,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"pour assurer la confidentialité et l’intégrité du trafic sans fil en utilisant le chiffrement","isCorrect":false},{"text":"pour éliminer l’analyse des SSID disponibles dans la zone","isCorrect":true},{"text":"pour réduire le risque d’interférence par des dispositifs externes tels que les fours à micro-ondes","isCorrect":false},{"text":"pour réduire le risque d’ajout de points d’accès non autorisés au réseau","isCorrect":false}],"title":"Un administrateur réseau est en train de configurer un WLAN. Pourquoi l’administrateur désactiverait-il la fonction de diffusion pour le SSID?"},{"id":101,"multi":false,"explanation":"Dans le domaine de l’Amérique du Nord, 11 canaux sont autorisés pour le réseau sans fil 2,4 GHz. Parmi ces 11 canaux, la combinaison des canaux 1, 6 et 11 est la seule combinaison de canaux sans chevauchement.","type":"quiz","image":"","options":[{"text":"Canaux 2, 6 et 10","isCorrect":false},{"text":"Canaux 1, 7 et 13","isCorrect":false},{"text":"Canaux 1, 6 et 11","isCorrect":true},{"text":"Canaux 1, 5 et 9","isCorrect":false}],"title":"Une entreprise déploie un réseau sans fil dans le site de distribution d’une banlieue de Boston. L’entrepôt est assez volumineux et nécessite l’utilisation de plusieurs points d’accès. Étant donné que certains appareils de l’entreprise fonctionnent toujours à 2,4 GHz, l’administrateur réseau décide de déployer la norme 802.11g. Quels sont les canaux que vous affecterez aux différents points d’accès afin d’éviter les chevauchements ?"},{"id":102,"multi":false,"explanation":"Les attaques de famine DHCP sont lancées par un attaquant avec l’intention de créer un DoS pour les clients DHCP. Pour atteindre cet objectif, l’attaquant utilise un outil qui envoie de nombreux messages DHCPDISCOVER afin de louer l’intégralité du pool d’adresses IP disponibles, les refusant ainsi aux hôtes légitimes.","type":"quiz","image":"","options":[{"text":"Attaque par dépassement de table CAM","isCorrect":false},{"text":"Insuffisance de ressources DHCP","isCorrect":true},{"text":"Usurpation d’adresse IP","isCorrect":false},{"text":"Usurpation DHCP (ou spoofing)","isCorrect":false}],"title":"Quelle attaque a pour but de créer un DOS pour les clients en les empêchant d’obtenir un crédit-bail DHCP ?"},{"id":103,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"Vérifiez que la route statique vers le serveur est présente dans la table de routage.","isCorrect":true},{"text":"Créez un itinéraire statique flottant vers ce réseau.","isCorrect":false},{"text":"Assurez-vous que l’ancien itinéraire par défaut a été supprimé des routeurs de bord de l’entreprise.","isCorrect":false},{"text":"Vérifiez la configuration sur l’itinéraire statique flottant et ajustez l’AD.","isCorrect":false}],"title":"Les utilisateurs d’un réseau local ne peuvent pas accéder à un serveur Web d’entreprise mais peuvent se rendre ailleurs. Que faut-il faire ou vérifier?"},{"id":104,"multi":false,"explanation":"Pour spécifier les interfaces dans un groupe EtherChannel, utilisez la commande de configuration globale \u003cb\u003einterface range\u003c/b\u003e\u003ci\u003einterface\u003c/i\u003e pour la plage d’interfaces utilisée. La commande \u003cb\u003einterface range GigabitEthernet 0/4 – 5\u003c/b\u003e est l’option correcte, car elle spécifie deux interfaces pour le groupe EtherChannel.","type":"quiz","image":"","options":[{"text":"channel-group 1 mode desirable","isCorrect":false},{"text":"interface range GigabitEthernet 0/4 – 5","isCorrect":true},{"text":"channel-group 2 mode auto","isCorrect":false},{"text":"interface port-channel 2","isCorrect":false}],"title":"Quelle commande permet de lancer le processus de regroupement de deux interfaces physiques afin de créer un groupe EtherChannel par le biais du protocole LACP ?"},{"id":105,"multi":false,"explanation":"Le transfert de trames coupées ne lit que les 22 premiers octets d’une trame, ce qui exclut la séquence de vérification des trames et, par conséquent, des trames non valides peuvent être transférées. En plus des trames de diffusion, les trames avec une adresse MAC de destination qui n’est pas dans le CAM sont également inondées par tous les ports actifs. Les trames Unicast ne sont pas toujours transmises. Les trames reçues avec une adresse MAC de destination associée au port du commutateur sur lequel elles sont reçues ne sont pas transférées car la destination existe sur le segment de réseau connecté à ce port.","type":"quiz","image":"","options":[{"text":"Les décisions de transfert de trame sont basées sur l’adresse MAC et les mappages des ports dans la table CAM.","isCorrect":true},{"text":"Le transfert de trame cut-through garantit que les trames non valides sont toujours abandonnées.","isCorrect":false},{"text":"Les trames monodiffusion sont toujours transmises indépendamment de l’adresse MAC de destination.","isCorrect":false},{"text":"Seules les trames avec des adresses de destination de diffusion sont transmises à tous les ports de commutateurs actifs.","isCorrect":false}],"title":"Quelle instruction est correcte sur la façon dont un commutateur de couche 2 détermine comment transférer des trames?"},{"id":106,"multi":true,"explanation":"les requêtes ARP sont envoyées sous forme de diffusions. Cela signifie que la demande ARP est envoyée uniquement à travers un VLAN spécifique. Les hôtes du VLAN 1 n’entendront que les demandes ARP des hôtes du VLAN 1. Les hôtes du VLAN 2 n’entendront que les demandes ARP des hôtes du VLAN 2.","type":"quiz","image":"https://ccnareponses.com/wp-content/uploads/2022/01/2022-01-26_112504.jpg","options":[{"text":"hôte D","isCorrect":true},{"text":"hôte C","isCorrect":true},{"text":"hôte F","isCorrect":true},{"text":"hôte G","isCorrect":false},{"text":"hôte B","isCorrect":false},{"text":"hôte E","isCorrect":false}],"title":"Reportez-vous à l’illustration. Quels sont les trois hôtes qui recevront des requêtes ARP de l’hôte A, dans l’hypothèse où le port Fa0/4 sur les deux commutateurs est configuré pour transporter du trafic pour plusieurs VLAN ? (Choisissez trois réponses.)"},{"id":107,"multi":true,"explanation":"","type":"quiz","image":"","options":[{"text":"Ils sont utilisés pour les liaisons point à multipoint.","isCorrect":false},{"text":"Dans un réseau commuté, elles sont principalement configurées entre les commutateurs, sur les couches principale et de distribution.","isCorrect":false},{"text":"Ils ne sont associés à aucun VLAN particulier.","isCorrect":true},{"text":"La commande interface vlan \u003cnuméro du VLAN\u003e doit être exécutée pour créer un VLAN sur les ports routés.","isCorrect":false},{"text":"Ils prennent en charge les sous-interfaces, notamment les interfaces sur les routeurs Cisco IOS.","isCorrect":false}],"title":"Parmi les propositions suivantes, lesquelles caractérisent les ports routés d’un commutateur multicouche ? Choisissez deux réponses."},{"id":108,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"EtherChannel","isCorrect":false},{"text":"DTP","isCorrect":false},{"text":"HSRP","isCorrect":true},{"text":"Protocole VTP","isCorrect":false}],"title":"Quel protocole ou technologie définit un groupe de routeurs, l’un d’eux défini comme actif et l’autre comme veille?"},{"id":109,"multi":false,"explanation":"Lorsque Rapid PVST+ est mis en œuvre, les types de liens sont déterminés automatiquement mais peuvent être spécifiés manuellement. Les types de liens peuvent être point à point, partagés ou de bord.","type":"quiz","image":"","options":[{"text":"Les types de liaisons sont déterminés automatiquement.","isCorrect":true},{"text":"Les types de liaisons peuvent uniquement être déterminés si PortFast a été configuré.","isCorrect":false},{"text":"Les types de liaisons peuvent uniquement être configurés sur des ports d’accès configurés au moyen d’un VLAN unique.","isCorrect":false},{"text":"Les types de liaisons doivent être configurés avec des commandes de configuration de port spécifiques.","isCorrect":false}],"title":"Un administrateur réseau prépare l’implémentation du protocole Rapid PVST+ sur un réseau de production. Comment les types de liaisons Rapid PVST+ sont-ils déterminés sur les interfaces de commutateur ?"},{"id":110,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"tous les ports équipés de PortFast","isCorrect":true},{"text":"tous les ports de trunk qui ne sont pas des ports racines","isCorrect":false},{"text":"seuls les ports qui s’attachent à un commutateur voisin","isCorrect":false},{"text":"uniquement les ports qui sont élus comme ports désignés","isCorrect":false}],"title":"Sur quels ports de commutation devrait-on activer la protection BPDU pour améliorer la stabilité STP?"},{"id":111,"multi":false,"explanation":"\u003cbr /\u003e\nDans la configuration DHCPv6 sans état, indiquée par la commande ipv6 nd other-config-flag, le serveur DHCPv6 ne conserve pas les informations d’état, car les adresses IPv6 des clients ne sont pas gérées par le serveur DHCP. Étant donné que les clients configureront leurs adresses IPv6 en combinant le préfixe/la longueur du préfixe et un ID d’interface auto-généré, la configuration du pool dhcp ipv6 n’a pas besoin de spécifier la plage d’adresses IPv6 valide. Et comme les clients utiliseront l’adresse lien-local de l’interface du routeur comme adresse de passerelle par défaut, l’adresse de passerelle par défaut n’est pas nécessaire.","type":"quiz","image":"https://ccnareponses.com/wp-content/uploads/2022/06/i210895v1n1_210895.jpg","options":[{"text":"Aucune plage d’adresses IPv6 n’est spécifiée pour la configuration du pool DHCP IPv6.","isCorrect":false},{"text":"Aucun client n’a encore communiqué avec le serveur DHCPv6.","isCorrect":false},{"text":"L’état n’est pas maintenu par le serveur DHCPv6 en mode de fonctionnement DHCPv6 sans état.","isCorrect":true},{"text":"L’adresse de la passerelle par défaut n’est pas disponible dans le pool.","isCorrect":false}],"title":"Examinez l’illustration. Un administrateur réseau configure un routeur comme serveur DHCPv6. L’administrateur exécute une commande show ipv6 dhcp pool pour vérifier la configuration. Parmi les propositions suivantes, laquelle décrit la raison pour laquelle le nombre de clients actifs est 0 ?"},{"id":112,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"Les VLAN des ports d’accès utilisateur doivent être différents des VLAN natifs utilisés sur les ports de jonction.","isCorrect":true},{"text":"Le numéro de VLAN natif utilisé sur n’importe quel tronc doit être l’un des VLAN de données actifs.","isCorrect":false},{"text":"Les ports de trunk doivent être configurés avec la sécurité de port.","isCorrect":false},{"text":"Les ports de trunk doivent utiliser le VLAN par défaut comme numéro de VLAN natif.","isCorrect":false}],"title":"Un administrateur réseau a trouvé un utilisateur envoyant une trame 802.1Q à un commutateur. Quelle est la meilleure solution pour prévenir ce type d’attaque?"},{"id":113,"multi":true,"explanation":"Avant que le commutateur ne soit placé dans le bon domaine VTP et en mode client, le commutateur doit être connecté à tout autre commutateur du domaine VTP via une jonction afin de recevoir/ transmettre des informations VTP.","type":"quiz","image":"","options":[{"text":"Configurer le nouveau commutateur en tant que client VTP.","isCorrect":true},{"text":"Activer l’élagage VTP.","isCorrect":false},{"text":"Configurer une adresse IP sur le nouveau commutateur.","isCorrect":false},{"text":"Configurer tous les ports du nouveau commutateur en mode d’accès","isCorrect":false},{"text":"Configurer le nom de domaine et le mot de passe VTP corrects sur le nouveau commutateur","isCorrect":true}],"title":"Un nouveau commutateur doit être ajouté à un réseau existant dans un bureau distant. L’administrateur réseau ne souhaite pas que les techniciens du bureau distant puissent ajouter de nouveaux VLAN au commutateur, mais le commutateur doit recevoir des mises à jour VLAN du domaine VTP. Quelles deux étapes doivent être effectuées pour configurer VTP sur le nouveau commutateur afin de répondre à ces conditions? (Choisissez deux propositions.)"},{"id":114,"multi":true,"explanation":"L’authentification AAA au niveau du serveur repose sur un serveur d’authentification TACACS ou RADIUS externe pour alimenter une base de noms d’utilisateur et de mots de passe. Quand un client établit une connexion avec un appareil prenant en compte le AAA, ce dernier authentifie le client après avoir fait une demande aux serveurs d’authentification.","type":"quiz","image":"","options":[{"text":"SSH","isCorrect":false},{"text":"TACACS+","isCorrect":true},{"text":"RADIUS","isCorrect":true},{"text":"802.1x","isCorrect":false},{"text":"SNMP","isCorrect":false}],"title":"Deux protocoles sont utilisés pour l’authentification AAA au niveau des serveurs. Lesquels ? (Choisissez deux propositions.)"},{"id":115,"multi":false,"explanation":"Il existe plusieurs mécanismes de stabilité STP recommandés pour aider à atténuer les attaques par manipulation STP :\u003cbr /\u003e\nPortFast – utilisé pour amener immédiatement une interface configurée comme un accès ou un port de jonction à l’état de transfert à partir d’un état de blocage. Appliqué à tous les ports d’utilisateur final.\u003cbr /\u003e\nBPDU guard – désactive immédiatement en cas d’erreur un port qui reçoit un BPDU. Appliqué à tous les ports d’utilisateur final. La réception de BPDU peut faire partie d’une tentative non autorisée d’ajouter un commutateur au réseau.\u003cbr /\u003e\nRoot guard – empêche un commutateur de devenir le commutateur racine. Appliqué à tous les ports où le commutateur racine ne doit pas être situé.\u003cbr /\u003e\nLoop guard – détecte les liens unidirectionnels pour empêcher les ports alternatifs ou racine de devenir des ports désignés. Appliqué à tous les ports qui sont ou peuvent devenir non désignés.","type":"quiz","image":"","options":[{"text":"attaque par débordement de la table CAM","isCorrect":false},{"text":"serveurs DHCP non fiables sur un réseau","isCorrect":false},{"text":"commutateurs non fiables sur un réseau","isCorrect":true},{"text":"Usurpation d’adresse MAC","isCorrect":false}],"title":"Quelle attaque réseau est atténuée en activant la garde BPDU ?"},{"id":116,"multi":false,"explanation":"Les périphériques réseau surveillés par le protocole SNMP peuvent être configurés pour générer des messages de journal envoyés à un serveur SNMP. Les messages de journal, également appelés pièges, contiennent tous les types d’informations, depuis les rapports d’état simples jusqu’aux situations urgentes complexes qui nécessitent une attention immédiate.","type":"quiz","image":"","options":[{"text":"L’accusé de réception","isCorrect":false},{"text":"Audit","isCorrect":false},{"text":"Déroutements","isCorrect":true},{"text":"avertissements","isCorrect":false}],"title":"Quel est le terme commun donné aux messages de journal SNMP générés par les périphériques réseau et envoyés au serveur SNMP?"},{"id":117,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"STP","isCorrect":false},{"text":"DTP","isCorrect":true},{"text":"Protocole VTP","isCorrect":false},{"text":"EtherChannel","isCorrect":false}],"title":"Quel protocole ou technologie est-il un protocole propriétaire Cisco qui est automatiquement activé sur les commutateurs 2960?"},{"id":118,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"pour assurer la confidentialité et l’intégrité du trafic sans fil en utilisant le chiffrement","isCorrect":true},{"text":"fournir un service prioritaire pour les applications sensibles au temps","isCorrect":false},{"text":"pour centraliser la gestion de plusieurs réseaux WLAN","isCorrect":false},{"text":"pour réduire le risque d’ajout de points d’accès non autorisés au réseau","isCorrect":false}],"title":"Un administrateur réseau est en train de configurer un WLAN. Pourquoi l’administrateur appliquerait-il WPA2 avec AES au WLAN?"},{"id":119,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"Vérifiez que la route statique vers le serveur est présente dans la table de routage.","isCorrect":false},{"text":"Vérifiez la configuration sur la route statique flottante et ajustez l’AD.","isCorrect":false},{"text":"Vérifiez la configuration de l’interface de sortie sur la nouvelle route statique.","isCorrect":true},{"text":"Créez une route statique flottante vers ce réseau.","isCorrect":false}],"title":"Un technicien junior ajoutait une route à un routeur LAN. Un traceroute vers un périphérique sur le nouveau réseau a révélé un mauvais chemin et un état inaccessible. Que faut-il faire ou vérifier?"},{"id":120,"multi":true,"explanation":"","type":"quiz","image":"","options":[{"text":"Les paramètres de mode bidirectionnel et de débit de chaque port du commutateur peuvent être configurés manuellement.","isCorrect":true},{"text":"Par défaut, la fonction de négociation automatique est désactivée.","isCorrect":false},{"text":"Si la vitesse est définie sur 1 000 Mbits/s, les ports de commutateur fonctionnent en mode bidirectionnel simultané.","isCorrect":true},{"text":"Par défaut, le débit est défini sur 100 Mbits/s et le mode bidirectionnel est réglé sur igne de nom de domaine est incluse dans la section du pool dhcp ipv6 .","isCorrect":false},{"text":"Le ipv6 nd other-config-flag entré pour l’interface qui fait face au segment LAN.","isCorrect":true},{"text":"La ligne dns-server est incluse dans la section ipv6 dhcp pool .","isCorrect":true},{"text":"La ligne de préfixe d’adresse est incluse dans la section ipv6 dhcp pool .","isCorrect":false},{"text":"Le ipv6 nd managed-config-flag est entré pour l’interface qui fait face au segment LAN.","isCorrect":false}],"title":"Un administrateur réseau a configuré un routeur pour une opération DHCPv6 sans état. Toutefois, les utilisateurs signalent que les stations de travail ne reçoivent pas d’informations sur le serveur DNS. Quelles sont les deux lignes de configuration du routeur qui doivent être vérifiées pour s’assurer que le service DHCPv6 sans état est correctement configuré? (Choisissez deux propositions.)"},{"id":127,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"EtherChannel","isCorrect":false},{"text":"Protocole VTP","isCorrect":false},{"text":"STP","isCorrect":true},{"text":"DTP","isCorrect":false}],"title":"Quel protocole ou quelle technologie désactive les chemins redondants pour éliminer les boucles de la couche 2 ?"},{"id":128,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"pour restreindre l’accès au WLAN uniquement par les utilisateurs autorisés et authentifiés","isCorrect":true},{"text":"pour faciliter la configuration de groupe et la gestion de plusieurs WLAN via un WLC","isCorrect":false},{"text":"pour centraliser la gestion de plusieurs réseaux WLAN","isCorrect":false},{"text":"pour surveiller le fonctionnement du réseau sans fil","isCorrect":false}],"title":"Un administrateur réseau est en train de configurer un WLAN. Pourquoi l’administrateur utiliserait-il des serveurs RADIUS sur le réseau?"},{"id":129,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"Il limite le nombre de messages de découverte, par seconde, à recevoir sur l’interface.","isCorrect":false},{"text":"Il passe un port de jonction en mode d’accès.","isCorrect":false},{"text":"Il vérifie l’adresse MAC de source dans l’en-tête Ethernet par rapport à l’adresse MAC de l’expéditeur dans le corps ARP.","isCorrect":false},{"text":"Il affiche les associations d’adresses IP à Mac pour les interfaces de commutation.","isCorrect":true}],"title":"Quel est l’effet de l’entrée de la commande de configuration show ip dhcp snooping binding sur un commutateur?"},{"id":33,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"Cela désactive un port inutilisé.","isCorrect":false},{"text":"Cela désactive tous les ports de jonction.","isCorrect":false},{"text":"Il active le portfast sur une interface de commutateur spécifique.","isCorrect":true},{"text":"Il vérifie l’adresse L2 source dans l’en-tête Ethernet par rapport à l’adresse L2 de l’expéditeur dans le corps ARP.","isCorrect":false}],"title":"Quel est l’effet de la saisie de la commande de configuration spanning-tree portfast sur un commutateur ?"},{"id":136,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"Le nombre de domaines de diffusion est augmenté.","isCorrect":false},{"text":"La taille du domaine de diffusion est augmentée.","isCorrect":true},{"text":"Le nombre de domaines de collision est réduit.","isCorrect":false},{"text":"La taille du domaine de collision est augmentée.","isCorrect":false}],"title":"Quel est le résultat de la connexion de deux ou plusieurs commutateurs ensemble ?"},{"id":139,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"Il apprend dynamiquement l’adresse L2 et la copie dans la configuration en cours.","isCorrect":false},{"text":"Il active la sécurité des ports sur une interface.","isCorrect":true},{"text":"Il active la sécurité des ports globalement sur le commutateur.","isCorrect":false},{"text":"Il restreint le nombre de messages de découverte, par seconde, à recevoir sur l’interface.","isCorrect":false}],"title":"Quel est l’effet de la saisie de la commande de configuration switchport port-security sur un commutateur ?"},{"id":140,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"pour centraliser la gestion de plusieurs WLAN","isCorrect":false},{"text":"pour surveiller le fonctionnement du réseau sans fil","isCorrect":false},{"text":"fournir un service prioritaire pour les applications urgentes","isCorrect":false},{"text":"pour faciliter la configuration et la gestion de groupe de plusieurs WLAN via un WLC","isCorrect":true}],"title":"Un administrateur réseau configure un WLAN. Pourquoi l’administrateur utiliserait-il plusieurs points d’accès légers ?"},{"id":141,"multi":false,"explanation":"Étant donné que PC-A et PC-B sont connectés à des commutateurs différents, le trafic entre eux doit passer par la liaison de jonction. Les liaisons peuvent être configurées de manière à autoriser uniquement le trafic de VLAN particuliers à traverser le lien. Dans ce scénario, le VLAN 60, le VLAN associé à PC-A et PC-B, n’a pas été autorisé sur la liaison, comme indiqué par la sortie de show interfaces trunk.","type":"quiz","image":"https://ccnareponses.com/wp-content/uploads/2022/06/i211586v1n1_Question-5.png","options":[{"text":"Le VLAN natif doit être le VLAN 60.","isCorrect":false},{"text":"Le VLAN natif est supprimé du lien.","isCorrect":false},{"text":"Le tronc a été configuré avec la commande switchport nonegotiate.","isCorrect":false},{"text":"Le VLAN utilisé par PC-A ne figure pas dans la liste des VLAN autorisés sur le tronc.","isCorrect":true},{"text":"La ligne de nom de domaine est incluse dans la section \u003ccode\u003eipv6 dhcp pool\u003c/code\u003e.","isCorrect":false},{"text":"La ligne DNS-server est incluse dans la section \u003ccode\u003eipv6 dhcp pool\u003c/code\u003e.","isCorrect":true},{"text":"Le \u003ccode\u003eipv6 nd other-config-flag\u003c/code\u003e est saisi pour l’interface qui fait face au segment LAN.","isCorrect":true},{"text":"La ligne de préfixe d’adresse est incluse dans la section \u003ccode\u003eipv6 dhcp pool\u003c/code\u003e.","isCorrect":false},{"text":"Le \u003ccode\u003eipv6 et managed-config-flag\u003c/code\u003e est saisi pour l’interface qui fait face au segment LAN.","isCorrect":false}],"title":"Examinez l’illustration. PC-A et PC-B sont tous deux dans le VLAN 60. PC-A est incapable de communiquer avec PC-B. Quel est le problème ?"},{"id":147,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"Le commutateur met à jour la minuterie d’actualisation de l’entrée.","isCorrect":false},{"text":"Le commutateur réinitialise la minuterie d’actualisation sur toutes les entrées de la table d’adresses MAC.","isCorrect":false},{"text":"Le commutateur remplace l’ancienne entrée et utilise le port le plus récent.","isCorrect":false},{"text":"Le commutateur transférera la trame vers tous les ports à l’exception du port entrant.","isCorrect":true},{"text":"VTP","isCorrect":false},{"text":"EtherChannel","isCorrect":false},{"text":"DTP","isCorrect":true},{"text":"STP","isCorrect":false}],"title":"Quelle action a lieu lorsqu’une trame entrant dans un commutateur a une adresse MAC de destination de monodiffusion qui ne figure pas dans la table d’adresses MAC ?"},{"id":154,"multi":false,"explanation":"","type":"quiz","image":"","options":[{"text":"Il affiche les associations d’adresses IP-MAC pour les interfaces de commutateur.","isCorrect":false},{"text":"Il active la sécurité des ports globalement sur le commutateur.","isCorrect":false},{"text":"Il restreint le nombre de messages de découverte, par seconde, à recevoir sur l’interface.","isCorrect":true},{"text":"Il apprend dynamiquement l’adresse L2 et la copie dans la configuration en cours.","isCorrect":false}],"title":"Quel est l’effet de la saisie de la commande de configuration \u003ccode\u003eip dhcp snooping limit rate 6\u003c pour se connecter au point d’accès. Les points d’accès et les routeurs sans fil peuvent fonctionner en mode mixte, ce qui signifie que plusieurs normes sans fil sont prises en charge. Open est un mode d’authentification pour un point d’accès qui n’a aucun impact sur la liste des réseaux sans fil disponibles pour un client. Lorsqu’un point d’accès est configuré en mode passif, le SSID est diffusé afin que le nom du réseau sans fil apparaisse dans la liste des réseaux disponibles pour les clients.","type":"quiz","image":"","options":[{"text":"mixte","isCorrect":false},{"text":"passif","isCorrect":false},{"text":"actif","isCorrect":true},{"text":"ouvrir","isCorrect":false}],"title":"Lorsqu’ils assistent à une conférence, les participants utilisent des ordinateurs portables pour la connectivité réseau. Lorsqu’un orateur invité tente de se connecter au réseau, l’ordinateur portable ne parvient pas à afficher les réseaux sans fil disponibles. Le point d’accès doit fonctionner dans quel mode ?"},{"id":173,"multi":false,"explanation":"Les trois composants qui sont combinés pour former un ID de pont sont la priorité du pont, l’ID système étendu et l’adresse MAC.","type":"quiz","image":"","options":[{"text":"ID système étendu","isCorrect":true},{"text":"coût","isCorrect":false},{"text":"Adresse IP","isCorrect":false},{"text":"priorité du pont","isCorrect":true},{"text":"Adresse MAC","isCorrect":true},{"text":"ID de port","isCorrect":false},{"text":"\u003ca lang=\"fr-FR\" hreflang=\"fr-FR\" href=\"https://ccnareponses.com/\" aria-current=\"true\"\u003e\u003cimg src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAALCAMAAABBPP0LAAAAbFBMVEVzldTg4ODS0tLxDwDtAwDjAADD0uz39/fy8vL3k4nzgna4yOixwuXu7u7s6+zn5+fyd2rvcGPtZljYAABrjNCpvOHrWkxegsqfs93NAADpUUFRd8THAABBa7wnVbERRKa8vLyxsLCoqKigoKClCvcsAAAAXklEQVR4AS3JxUEAQQAEwZo13Mk/R9w5/7UERJCIGIgj5qfRJZEpPyNfCgJTjMR1eRRnJiExFJz5Mf1PokWr/UztIjRGQ3V486u0HO55m634U6dMcf0RNPfkVCTvKjO16xHA8miowAAAAABJRU5ErkJggg==\" alt=\"\" width=\"16\" height=\"11\" style=\"width: 16px; height: 11px;\" /\u003e\u003cspan style=\"margin-left:0.3em;\"\u003eFrançais\u003c/span\u003e\u003c/a\u003e","isCorrect":false},{"text":"\u003ca href=\"#\" data-tab=\"tab-0-ccna-1\"\u003eCCNA 1\u003c/a\u003e","isCorrect":false},{"text":"\u003ca href=\"#\" data-tab=\"tab-1-ccna-2\"\u003eCCNA 2\u003c/a\u003e","isCorrect":false},{"text":"\u003ca href=\"#\" data-tab=\"tab-2-ccna-3\"\u003eCCNA 3\u003c/a\u003e","isCorrect":false}],"title":"Quels sont les trois composants combinés pour former un identifiant de pont ?"}];
        
        let currentIndex = 0;
        let currentMode = 'training'; // 'training' or 'exam'
        let userAnswers = {}; // Map: id -> { selected: [], validated: bool, isCorrect: bool }
        let isReview = false;

        // Init
        function init() {
            // Shuffle questions? Optional. Let's keep order for now or maybe shuffle.
            // questions.sort(() => Math.random() - 0.5); 
            renderQuestion();
            updateProgress();
        }

        function setMode(mode) {
            if(confirm("Changer de mode r\u00e9initialisera la progression. Continuer ?")) {
                currentMode = mode;
                document.getElementById('mode-train').className = mode === 'training' ? 'btn-mode active' : 'btn-mode';
                document.getElementById('mode-exam').className = mode === 'exam' ? 'btn-mode active' : 'btn-mode';
                
                // Reset
                currentIndex = 0;
                userAnswers = {};
                isReview = false;
                document.getElementById('view-result').style.display = 'none';
                document.getElementById('view-quiz').style.display = 'block';
                renderQuestion();
                updateProgress();
            }
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            const box = document.getElementById('q-box');
            
            // State
            if(!userAnswers[q.id]) {
                userAnswers[q.id] = { selected: [], validated: false, isCorrect: false };
            }
            const state = userAnswers[q.id];

            let html = `
                <div class="q-header">
                    <span class="q-badge">Question ${currentIndex + 1} / ${questions.length}</span>
                    <span class="q-num">#${q.id}</span>
                </div>
                <div class="q-text">${q.title}</div>
            `;

            if(q.image) {
                html += `<img src="${q.image}" class="q-img" alt="Illustration Question">`;
            }

            html += `<div class="options">`;
            
            q.options.forEach((opt, idx) => {
                let cls = 'opt-btn';
                const isSelected = state.selected.includes(idx);
                
                if(isSelected) cls += ' selected';
                
                // Show validation colors
                if(state.validated || isReview) {
                    if(opt.isCorrect) cls += ' correct';
                    else if(isSelected && !opt.isCorrect) cls += ' wrong';
                }

                html += `<button class="${cls}" onclick="selectOption(${idx})">${opt.text}</button>`;
            });
            html += `</div>`;

            // Explanation (only show if validated training mode OR review mode)
            if( (currentMode === 'training' && state.validated) || isReview ) {
                if(q.explanation) {
                     html += `<div class="explanation"><strong>Explication:</strong><br>${q.explanation}</div>`;
                }
            }

            box.innerHTML = html;

            // Update buttons
            document.getElementById('btn-prev').disabled = (currentIndex === 0);
            
            const btnValid = document.getElementById('btn-valid');
            const btnNext = document.getElementById('btn-next');

            if(isReview) {
                btnValid.style.display = 'none';
                btnNext.style.display = 'block';
                btnNext.innerText = (currentIndex === questions.length - 1) ? "Retour R\u00e9sultats" : "Suivant";
            } else if (currentMode === 'training') {
                if(state.validated) {
                    btnValid.style.display = 'none';
                    btnNext.style.display = 'block';
                    btnNext.innerText = (currentIndex === questions.length - 1) ? "Voir R\u00e9sultats" : "Suivant";
                } else {
                    btnValid.style.display = 'block';
                    btnNext.style.display = 'none';
                }
            } else { // Exam mode
                btnValid.style.display = 'none';
                btnNext.style.display = 'block';
                btnNext.innerText = (currentIndex === questions.length - 1) ? "Terminer" : "Suivant";
            }

            updateProgress();
        }

        function selectOption(idx) {
            const q = questions[currentIndex];
            const state = userAnswers[q.id];

            if(state.validated || isReview) return; // Locked

            if(q.multi) {
                const i = state.selected.indexOf(idx);
                if(i > -1) state.selected.splice(i, 1);
                else state.selected.push(idx);
            } else {
                // Single choice toggle
                if(state.selected.includes(idx)) state.selected = [];
                else state.selected = [idx];
            }
            renderQuestion();
        }

        function validate() {
            const q = questions[currentIndex];
            const state = userAnswers[q.id];
            
            // Logic: Mark as validated, check correctness
            state.validated = true;
            
            // Check correctness
            // Get indices of correct options
            const correctIndices = q.options.map((o, i) => o.isCorrect ? i : -1).filter(i => i !== -1).sort().join(',');
            const userIndices = state.selected.sort().join(',');
            
            state.isCorrect = (correctIndices === userIndices && userIndices !== "");
            
            renderQuestion();
        }

        function move(dir) {
            const next = currentIndex + dir;
            
            // Button Logic for "Finish" or "Back to Result"
            if(isReview && next >= questions.length) {
                document.getElementById('view-quiz').style.display = 'none';
                document.getElementById('view-result').style.display = 'block';
                return;
            }

            if(!isReview && next >= questions.length) {
                finishQuiz();
                return;
            }

            if(next >= 0 && next < questions.length) {
                currentIndex = next;
                renderQuestion();
            }
        }

        function finishQuiz() {
            let correct = 0;
            let total = 0;

            questions.forEach(q => {
                let st = userAnswers[q.id];
                if(!st) {
                     st = { selected:[], validated:true, isCorrect:false };
                     userAnswers[q.id] = st;
                }
                
                // For Exam mode, validate now
                if(!st.validated) {
                    st.validated = true;
                    const correctIndices = q.options.map((o, i) => o.isCorrect ? i : -1).filter(i => i !== -1).sort().join(',');
                    const userIndices = st.selected.sort().join(',');
                    st.isCorrect = (correctIndices === userIndices && userIndices !== "");
                }

                if(q.type === 'quiz') {
                    total++;
                    if(st.isCorrect) correct++;
                }
            });

            const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
            
            // Render Result
            document.getElementById('view-quiz').style.display = 'none';
            document.getElementById('view-result').style.display = 'block';
            
            // Color circle
            const circle = document.getElementById('score-circle');
            const color = pct >= 75 ? '#00b894' : '#d63031';
            circle.style.background = `conic-gradient(${color} ${pct}%, #eee ${pct}%)`;
            
            document.getElementById('score-text').innerText = pct + "%";
            document.getElementById('score-msg').innerHTML = `Vous avez <b>${correct}</b> bonnes r&eacute;ponses sur <b>${total}</b>.<br>` +
                (pct >= 75 ? "Excellent travail ! Vous &ecirc;tes pr&ecirc;t." : "Continuez \u00e0 r\u00e9viser.");
        }

        function reviewMode() {
            isReview = true;
            currentIndex = 0;
            document.getElementById('view-result').style.display = 'none';
            document.getElementById('view-quiz').style.display = 'block';
            renderQuestion();
        }

        function updateProgress() {
            const pct = ((currentIndex + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = pct + "%";
        }

        // Start
        init();

    </script>
</body>
</html>
